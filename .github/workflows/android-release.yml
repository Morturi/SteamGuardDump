name: Android Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v1.3.2
        required: true
      prerelease:
        description: Publish as prerelease
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Decode keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Sign release APK
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          unsigned_apk="$(find app/build/outputs/apk/release -name '*.apk' ! -name '*-signed.apk' | head -n 1)"
          build_tools_dir="$(find "${ANDROID_SDK_ROOT}/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"

          test -n "$unsigned_apk"
          test -n "$build_tools_dir"

          "$build_tools_dir/apksigner" sign \
            --ks release.keystore \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass pass:"$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass pass:"$ANDROID_KEY_PASSWORD" \
            --out "SteamGuardDump-${{ github.event.inputs.tag }}.apk" \
            "$unsigned_apk"

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SteamGuardDump-${{ github.event.inputs.tag }}
          path: SteamGuardDump-${{ github.event.inputs.tag }}.apk

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            gh release create "${{ github.event.inputs.tag }}" \
              "SteamGuardDump-${{ github.event.inputs.tag }}.apk" \
              --target "${GITHUB_SHA}" \
              --generate-notes \
              --prerelease
          else
            gh release create "${{ github.event.inputs.tag }}" \
              "SteamGuardDump-${{ github.event.inputs.tag }}.apk" \
              --target "${GITHUB_SHA}" \
              --generate-notes
          fi
